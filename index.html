<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1a1a2e">
    <title>Dual Camera PWA</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <!-- Leaflet Maps CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>📸 Dual Camera</h1>
            <p>Foto Selfie + Foto Objek</p>
        </div>

        <!-- Preview Video Kamera -->
        <div class="camera-container">
            <video id="video" autoplay playsinline muted></video>
            <div class="camera-overlay" id="cameraOverlay">
                <span id="cameraLabel">📷 Kamera Depan</span>
            </div>
        </div>

        <!-- Tombol Kontrol Kamera -->
        <div class="camera-controls">
            <button id="switchCameraBtn" class="btn-secondary">🔄 Ganti Kamera</button>
        </div>

        <!-- Tombol Ambil Foto -->
        <div class="capture-buttons">
            <button id="captureFrontBtn" class="btn-capture">🤳 Ambil Selfie</button>
            <button id="captureBackBtn" class="btn-capture">📱 Ambil Objek</button>
        </div>

        <!-- Opsi Upload Foto -->
        <div class="upload-section">
            <p class="separator"><span>ATAU</span></p>
            <input type="file" id="uploadInput" accept="image/*" hidden>
            <button id="uploadBtn" class="btn-upload">📁 Upload Foto dari Galeri</button>
        </div>

        <!-- Informasi Lokasi & Waktu -->
        <div class="info-panel" id="infoPanel">
            <div class="info-row">
                <span class="info-icon">📍</span>
                <span id="locationText">Mendapatkan lokasi...</span>
                <button id="refreshLocationBtn" class="btn-refresh-mini" title="Coba lagi">🔄</button>
            </div>
            <div class="info-row">
                <span class="info-icon">🕐</span>
                <span id="timestampText">--:-- --</span>
            </div>
            <div class="info-row">
                <span class="info-icon">📡</span>
                <span id="coordText">-</span>
            </div>
        </div>

        <!-- Map Panel -->
        <div class="map-panel">
            <div id="map"></div>
        </div>

        <!-- Preview Foto yang Diambil -->
        <div class="preview-section">
            <h3>📸 Hasil Foto Terbaru</h3>
            <div class="preview-container">
                <div class="preview-card" id="previewCard">
                    <div class="preview-label" id="resultLabel">Belum ada foto</div>
                    <img id="previewImg" class="preview-img" src="" alt="Belum ada foto">
                    <button id="downloadBtn" class="btn-download" disabled>⬇️ Download Hasil Foto</button>
                </div>
            </div>
        </div>

        <!-- Status -->
        <div class="status" id="status">
            ✅ Siap mengambil foto
        </div>
    </div>

    <!-- Leaflet Maps JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="js/app.js"></script>
</body>

</html>
